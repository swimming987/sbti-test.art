<!DOCTYPE html>
<html lang="{{htmlLang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{faq.title}} | SBTI Test</title>
  <meta name="description" content="{{faq.title}} - SBTI">
  <link rel="canonical" href="{{siteUrl}}{{prefix}}/faq">
  <link rel="alternate" hreflang="zh-Hans" href="{{siteUrl}}/faq">
  <link rel="alternate" hreflang="en" href="{{siteUrl}}/en/faq">
  <link rel="alternate" hreflang="zh-Hant" href="{{siteUrl}}/zh-TW/faq">
  <link rel="alternate" hreflang="x-default" href="{{siteUrl}}/faq">
  <link rel="stylesheet" href="/css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {{#each faq.items}}
      {
        "@type": "Question",
        "name": "{{q}}",
        "acceptedAnswer": { "@type": "Answer", "text": "{{a}}" }
      }{{/each}}
    ]
  }
  </script>
</head>
<body>
{{> header}}
<main class="content-page">
  <div class="container">
    <div class="content-card">
      <h1>{{faq.title}}</h1>
      <div class="faq-list" style="margin-top:24px">
        {{#each faq.items}}
        <details class="faq-item">
          <summary>{{q}}</summary>
          <div class="faq-answer">{{a}}</div>
        </details>
        {{/each}}
      </div>
    </div>
  </div>
</main>
{{> footer}}
<script src="/js/main.js"></script>
</body>
</html>
